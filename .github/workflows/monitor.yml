# ============================================================
# GitHub Actions ワークフロー：Driveファイル監視
# 【スケジュール】2時間おき・JST 6:00〜22:00（UTC 21:00〜13:00）
# 【手動実行】GitHub上の「Run workflow」ボタンでも起動可能
# ============================================================

name: Drive File Monitor

on:
  schedule:
    # cron はUTC基準。JST = UTC+9 なので9時間引いた値を指定する
    # JST  6:00 → UTC 21:00（前日）
    # JST  8:00 → UTC 23:00（前日）
    # JST 10:00 → UTC  1:00
    # JST 12:00 → UTC  3:00
    # JST 14:00 → UTC  5:00
    # JST 16:00 → UTC  7:00
    # JST 18:00 → UTC  9:00
    # JST 20:00 → UTC 11:00
    # JST 22:00 → UTC 13:00
    - cron: '0 21,23,1,3,5,7,9,11,13 * * *'

  # 手動実行ボタン（テスト用）
  workflow_dispatch:

jobs:
  monitor:
    runs-on: ubuntu-latest
    timeout-minutes: 10   # 万が一ハングしても10分で強制終了

    steps:
      - name: リポジトリをチェックアウト
        uses: actions/checkout@v4

      - name: Python セットアップ
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: 依存ライブラリをインストール
        run: |
          pip install --quiet \
            gspread \
            google-auth \
            google-api-python-client

      - name: Driveファイル監視スクリプトを実行
        env:
          # ── GitHub Secrets から注入する環境変数 ──────────────
          # GOOGLE_SA_JSON : サービスアカウントJSONファイルの中身（全文）
          # GAS_MAIL_URL   : GAS WebアプリのデプロイURL
          # EMAIL_TO       : 通知先メールアドレス（任意・省略時はスクリプト内デフォルト値）
          # FOLDER_ID      : 監視フォルダID（任意・省略時はスクリプト内デフォルト値）
          # SPREADSHEET_ID : スプレッドシートID（任意・省略時はスクリプト内デフォルト値）
          GOOGLE_SA_JSON: ${{ secrets.GOOGLE_SA_JSON }}
          GAS_MAIL_URL:   ${{ secrets.GAS_MAIL_URL }}
          GAS_SECRET_TOKEN: ${{ secrets.GAS_SECRET_TOKEN }}   # ← これを追加
          EMAIL_TO:       ${{ secrets.EMAIL_TO }}
        run: python monitor.py
